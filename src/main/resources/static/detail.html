<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>菜谱详情 - 小福贵儿</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- Markdown 解析库 -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <!-- 头部 -->
    <header class="header" onclick="window.location.href='index.html'" style="cursor: pointer;" title="点击返回首页">
        <div class="container">
            <h1>小福贵儿</h1>
            <p>探索中华美食，品味家常味道</p>
        </div>
    </header>

    <!-- 详情内容 -->
    <div class="container detail-page">
        <!-- 返回按钮 -->
        <a href="javascript:void(0)" onclick="goBackToList()" class="back-btn">
            <span>&larr;</span>
            <span>返回列表</span>
        </a>

        <!-- 加载状态 -->
        <div id="loading" class="loading">
            加载中
        </div>

        <!-- 错误状态 -->
        <div id="errorState" class="empty-state" style="display: none;">
            <div class="icon">😥</div>
            <p id="errorMessage">菜谱不存在</p>
            <a href="javascript:void(0)" onclick="goBackToList()" class="back-btn" style="margin-top: 20px;">返回列表</a>
        </div>

        <!-- 详情卡片 -->
        <div id="detailCard" class="detail-card" style="display: none;">
            <!-- 头部信息 -->
            <div class="detail-header">
                <div class="detail-image">
                    <div id="recipeImage"></div>
                </div>
                <div class="detail-info">
                    <h1 id="recipeName">菜品名称</h1>
                    <div class="detail-meta" id="recipeMeta">
                        <!-- 标签动态生成 -->
                    </div>
                    <div class="detail-stats" id="recipeStats">
                        <!-- 统计信息动态生成 -->
                    </div>
                    <div id="healthBenefit" style="display: none;">
                        <strong>养生功效：</strong>
                        <span id="healthBenefitText"></span>
                    </div>
                    <div class="recommend-action" style="margin-top: 15px;">
                        <button id="recommendBtn" class="recommend-toggle-btn" onclick="toggleRecommend()">
                            <span id="recommendBtnIcon">⭐</span>
                            <span id="recommendBtnText">添加到小曾推荐</span>
                        </button>
                    </div>
                    <div class="recommend-action" style="margin-top: 10px;">
                        <button id="weeklyPlanBtn" class="recommend-toggle-btn weekly-plan-toggle-btn" onclick="toggleWeeklyPlan()">
                            <span id="weeklyPlanBtnIcon">📅</span>
                            <span id="weeklyPlanBtnText">加入玉芳心愿单</span>
                        </button>
                    </div>
                    <div class="recommend-action" style="margin-top: 10px;">
                        <button id="aiBtn" class="recommend-toggle-btn ai-btn" onclick="askAI()">
                            <span id="aiBtnIcon">🤖</span>
                            <span id="aiBtnText">AI一下</span>
                        </button>
                    </div>
                </div>
            </div>

            <!-- AI 回复区域 -->
            <div id="aiResponseSection" class="ai-response-section" style="display: none;">
                <div class="ai-response-header">
                    <span class="ai-response-title">🤖 AI 烹饪助手</span>
                    <div class="ai-response-header-actions">
                        <button class="ai-response-copy-btn" id="aiCopyBtn" onclick="copyAiResponse()">📋 复制</button>
                    </div>
                </div>
                <div class="ai-response-decor">
                    <span>🍳</span><span>🥢</span><span>🔪</span><span>🧂</span><span>🍲</span>
                </div>
                <div class="ai-response-keyword" id="aiResponseKeyword"></div>
                <div id="aiResponseContent" class="ai-response-content">
                    <!-- AI 回复内容动态生成 -->
                </div>
            </div>

            <!-- 配料 -->
            <div class="detail-section">
                <h2>📦 配料清单</h2>
                <div id="ingredientsList" class="ingredients-list">
                    <!-- 配料动态生成 -->
                </div>
            </div>

            <!-- 步骤 -->
            <div class="detail-section">
                <h2>👨‍🍳 制作步骤</h2>
                <div id="stepsList" class="steps-list">
                    <!-- 步骤动态生成 -->
                </div>
            </div>
        </div>
    </div>

    <script>
        // API 基础路径
        const API_BASE = '/api/recipes';
        const WEEKLY_PLAN_API_BASE = '/api/weekly-plan';

        // 当前菜谱数据
        let currentRecipe = null;

        /**
         * 返回列表页并恢复之前的状态
         * 读取URL中的page、category、search参数，构造返回URL
         */
        function goBackToList() {
            const urlParams = new URLSearchParams(window.location.search);
            const page = urlParams.get('page') || '1';
            const category = urlParams.get('category') || '';
            const search = urlParams.get('search') || '';

            // 构造返回URL，使用hash来传递状态
            let backUrl = 'index.html';
            const backParams = new URLSearchParams();
            if (page !== '1') backParams.set('page', page);
            if (category) backParams.set('category', category);
            if (search) backParams.set('search', search);

            if (backParams.toString()) {
                backUrl += '#' + backParams.toString();
            }

            window.location.href = backUrl;
        }

        // 页面加载时获取详情
        document.addEventListener('DOMContentLoaded', function() {
            const urlParams = new URLSearchParams(window.location.search);
            const id = urlParams.get('id');
            const autoAI = urlParams.get('autoAI') === 'true';

            if (!id) {
                showError('缺少菜谱 ID');
                return;
            }

            loadRecipeDetail(id, autoAI);
        });

        // 加载菜谱详情
        async function loadRecipeDetail(id, autoAI = false) {
            try {
                const response = await fetch(`${API_BASE}/${id}`);
                const result = await response.json();

                if (result.code === 0 && result.data) {
                    currentRecipe = result.data;
                    renderDetail(result.data);
                    loadWeeklyPlanStatus(result.data.id);

                    // 如果带有 autoAI 参数，自动触发 AI
                    if (autoAI) {
                        setTimeout(() => {
                            askAI();
                            // 滚动到 AI 按钮位置，让用户能看到按钮和 AI 输出
                            setTimeout(() => {
                                const aiBtn = document.getElementById('aiBtn');
                                if (aiBtn) {
                                    aiBtn.scrollIntoView({ behavior: 'smooth', block: 'center' });
                                }
                            }, 30);
                        }, 300);
                    }
                } else {
                    showError(result.message || '菜谱不存在');
                }
            } catch (error) {
                console.error('加载菜谱详情失败:', error);
                showError('网络错误，请稍后重试');
            }
        }

        // 渲染详情
        function renderDetail(recipe) {
            // 隐藏加载状态
            document.getElementById('loading').style.display = 'none';
            document.getElementById('detailCard').style.display = 'block';

            // 更新页面标题
            document.title = `${recipe.name} - 小富贵菜谱`;

            // 图片
            const imageContainer = document.getElementById('recipeImage');
            if (recipe.imageUrl) {
                imageContainer.innerHTML = `<img src="${recipe.imageUrl}" alt="${escapeHtml(recipe.name)}" onerror="this.outerHTML='<div class=\\'placeholder-img\\'>🍲</div>'">`;
            } else {
                imageContainer.innerHTML = '<div class="placeholder-img">🍲</div>';
            }

            // 名称
            document.getElementById('recipeName').textContent = recipe.name;

            // 标签
            const metaHtml = [];
            if (recipe.category) {
                metaHtml.push(`<span class="meta-tag cuisine">${escapeHtml(recipe.category)}</span>`);
            }
            if (recipe.seasonTags) {
                recipe.seasonTags.split(/[,，]/).forEach(tag => {
                    if (tag.trim()) {
                        metaHtml.push(`<span class="meta-tag">${escapeHtml(tag.trim())}</span>`);
                    }
                });
            }
            if (recipe.festivalTags) {
                recipe.festivalTags.split(/[,，]/).forEach(tag => {
                    if (tag.trim()) {
                        metaHtml.push(`<span class="meta-tag">${escapeHtml(tag.trim())}</span>`);
                    }
                });
            }
            document.getElementById('recipeMeta').innerHTML = metaHtml.join('');

            // 统计信息
            const statsHtml = [];
            if (recipe.cookingTime) {
                statsHtml.push(`
                    <div class="stat-item">
                        <div class="label">烹饪时间</div>
                        <div class="value">${recipe.cookingTime}分钟</div>
                    </div>
                `);
            }
            if (recipe.difficulty) {
                statsHtml.push(`
                    <div class="stat-item">
                        <div class="label">难度等级</div>
                        <div class="value">${getDifficultyText(recipe.difficulty)}</div>
                    </div>
                `);
            }
            if (recipe.spicyLevel !== null && recipe.spicyLevel !== undefined) {
                statsHtml.push(`
                    <div class="stat-item">
                        <div class="label">辣度</div>
                        <div class="value">${getSpicyLevel(recipe.spicyLevel)}</div>
                    </div>
                `);
            }
            if (recipe.recommendScore) {
                statsHtml.push(`
                    <div class="stat-item">
                        <div class="label">推荐指数</div>
                        <div class="value">${getRecommendScore(recipe.recommendScore)}</div>
                    </div>
                `);
            }
            if (recipe.marketPrice) {
                statsHtml.push(`
                    <div class="stat-item">
                        <div class="label">参考价格</div>
                        <div class="value">¥${recipe.marketPrice}</div>
                    </div>
                `);
            }
            document.getElementById('recipeStats').innerHTML = statsHtml.join('');

            // 养生功效
            if (recipe.healthBenefit) {
                document.getElementById('healthBenefit').style.display = 'block';
                document.getElementById('healthBenefitText').textContent = recipe.healthBenefit;
            }

            // 更新推荐按钮状态
            updateRecommendButton(recipe.recommended);

            // 配料
            renderIngredients(recipe.ingredients);

            // 步骤
            renderSteps(recipe.steps);
        }

        // 解析数据（支持 JSON 数组和普通文本格式）
        function parseDataToArray(str, textDelimiter) {
            if (!str || str === '[]') {
                return [];
            }

            // 尝试 JSON 解析
            try {
                const parsed = JSON.parse(str);
                if (Array.isArray(parsed)) {
                    return parsed.filter(item => item && String(item).trim());
                }
            } catch (e) {
                // 非 JSON 格式，使用文本分割
            }

            // 文本分割
            return str.split(textDelimiter).filter(item => item && item.trim());
        }

        // 渲染配料
        function renderIngredients(ingredientsStr) {
            const container = document.getElementById('ingredientsList');

            const ingredients = parseDataToArray(ingredientsStr, /[,，;；\n]/);

            if (ingredients.length === 0) {
                container.innerHTML = '<p style="color: #999;">暂无配料信息</p>';
                return;
            }

            container.innerHTML = ingredients.map(item => `
                <div class="ingredient-item">${escapeHtml(String(item).trim())}</div>
            `).join('');
        }

        // 渲染步骤
        function renderSteps(stepsStr) {
            const container = document.getElementById('stepsList');

            // 先尝试 JSON 解析
            let steps = parseDataToArray(stepsStr, /\n/);

            // 如果不是 JSON 且有数字序号格式，用序号分割
            if (steps.length === 1 && /\d+[.、．]\s*/.test(stepsStr)) {
                steps = stepsStr.split(/\d+[.、．]\s*/).filter(item => item && item.trim());
            }

            if (steps.length === 0) {
                container.innerHTML = '<p style="color: #999;">暂无步骤信息</p>';
                return;
            }

            container.innerHTML = steps.map(step => `
                <div class="step-item">
                    <div class="step-content">${escapeHtml(String(step).trim())}</div>
                </div>
            `).join('');
        }

        // 显示错误
        function showError(message) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('errorState').style.display = 'block';
            document.getElementById('errorMessage').textContent = message;
        }

        // 获取难度文字
        function getDifficultyText(level) {
            const texts = ['', '简单', '普通', '较难', '困难', '大师级'];
            return texts[level] || '未知';
        }

        // 获取辣度显示
        function getSpicyLevel(level) {
            if (!level || level === 0) return '不辣';
            return '🌶️'.repeat(Math.min(level, 5));
        }

        // 获取推荐星级
        function getRecommendScore(score) {
            if (!score) return '-';
            const fullStars = Math.floor(score / 2);
            const halfStar = score % 2 >= 1;
            let stars = '⭐'.repeat(fullStars);
            if (halfStar) stars += '✨';
            return stars || '-';
        }

        // HTML 转义
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 更新推荐按钮状态
        function updateRecommendButton(isRecommended) {
            const btn = document.getElementById('recommendBtn');
            const icon = document.getElementById('recommendBtnIcon');
            const text = document.getElementById('recommendBtnText');

            if (isRecommended === 1) {
                btn.classList.add('recommended');
                icon.textContent = '✅';
                text.textContent = '已加入小曾推荐';
            } else {
                btn.classList.remove('recommended');
                icon.textContent = '⭐';
                text.textContent = '添加到小曾推荐';
            }
        }

        // 切换推荐状态
        async function toggleRecommend() {
            if (!currentRecipe) return;

            const newStatus = currentRecipe.recommended === 1 ? 0 : 1;
            const btn = document.getElementById('recommendBtn');
            btn.disabled = true;

            try {
                const response = await fetch(`${API_BASE}/update`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        id: currentRecipe.id,
                        recommended: newStatus
                    })
                });
                const result = await response.json();

                if (result.code === 0) {
                    currentRecipe.recommended = newStatus;
                    updateRecommendButton(newStatus);
                } else {
                    alert('操作失败：' + (result.message || '未知错误'));
                }
            } catch (error) {
                console.error('切换推荐状态失败:', error);
                alert('网络错误，请稍后重试');
            } finally {
                btn.disabled = false;
            }
        }

        // 更新本周计划按钮状态
        function updateWeeklyPlanButton(inWeeklyPlan) {
            const btn = document.getElementById('weeklyPlanBtn');
            const icon = document.getElementById('weeklyPlanBtnIcon');
            const text = document.getElementById('weeklyPlanBtnText');

            if (inWeeklyPlan) {
                btn.classList.add('recommended');
                icon.textContent = '✅';
                text.textContent = '已加入玉芳心愿单';
            } else {
                btn.classList.remove('recommended');
                icon.textContent = '📅';
                text.textContent = '加入玉芳心愿单';
            }
        }

        // 加载本周计划状态
        async function loadWeeklyPlanStatus(recipeId) {
            if (!recipeId) return;
            try {
                const response = await fetch(`${WEEKLY_PLAN_API_BASE}/exists?recipeId=${recipeId}`);
                const result = await response.json();
                if (result.code === 0) {
                    currentRecipe.inWeeklyPlan = !!result.data;
                    updateWeeklyPlanButton(currentRecipe.inWeeklyPlan);
                }
            } catch (error) {
                console.error('加载本周计划状态失败:', error);
            }
        }

        // 切换本周计划状态
        async function toggleWeeklyPlan() {
            if (!currentRecipe) return;

            const btn = document.getElementById('weeklyPlanBtn');
            btn.disabled = true;

            const api = currentRecipe.inWeeklyPlan ? `${WEEKLY_PLAN_API_BASE}/remove` : `${WEEKLY_PLAN_API_BASE}/add`;

            try {
                const response = await fetch(api, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ recipeId: currentRecipe.id })
                });
                const result = await response.json();

                if (result.code === 0) {
                    currentRecipe.inWeeklyPlan = !currentRecipe.inWeeklyPlan;
                    updateWeeklyPlanButton(currentRecipe.inWeeklyPlan);
                } else {
                    alert('操作失败：' + (result.message || '未知错误'));
                }
            } catch (error) {
                console.error('切换本周计划状态失败:', error);
                alert('网络错误，请稍后重试');
            } finally {
                btn.disabled = false;
            }
        }

        /**
         * AI一下 - 调用大模型获取菜品相关信息
         * 使用流式接口实时显示 AI 回复
         */
        async function askAI() {
            if (!currentRecipe) return;

            const btn = document.getElementById('aiBtn');
            const icon = document.getElementById('aiBtnIcon');
            const text = document.getElementById('aiBtnText');
            const responseSection = document.getElementById('aiResponseSection');
            const responseContent = document.getElementById('aiResponseContent');
            const responseKeyword = document.getElementById('aiResponseKeyword');

            // 禁用按钮，显示加载状态
            btn.disabled = true;
            icon.textContent = '⏳';
            text.textContent = '思考中...';

            // 显示回复区域，设置标题，清空内容
            responseSection.style.display = 'block';
            responseKeyword.textContent = `「${currentRecipe.name}」的烹饪说明`;
            responseContent.innerHTML = '<div class="ai-loading-hint">AI 正在思考中...</div>';

            const systemPrompt = '你是一个幽默风趣的专业厨师，精通各种菜品的做法。回复要求：1.不要使用Markdown格式（不要用#、**、-、•等符号）；2.步骤用"第一步"、"第二步"表述，每一步必须单独一行，步骤之间要换行；3.食材清单每种食材单独一行；4.语言风格轻松幽默，可以加入俏皮话；5.做法必须详细完整，食材用量准确，步骤不能省略，火候时间要具体。';
            const userMessage = `请介绍一下"${currentRecipe.name}"这道菜`;

            try {
                const response = await fetch('/api/chatStream', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: userMessage,
                        systemPrompt: systemPrompt
                    })
                });

                if (!response.ok) {
                    throw new Error('请求失败');
                }

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let fullContent = '';
                let buffer = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });

                    // 逐行处理
                    let newlineIndex;
                    while ((newlineIndex = buffer.indexOf('\n')) !== -1) {
                        const line = buffer.substring(0, newlineIndex);
                        buffer = buffer.substring(newlineIndex + 1);

                        if (line.startsWith('data:')) {
                            fullContent += line.substring(5);
                        }
                    }

                    // 实时更新页面
                    responseContent.innerHTML = formatSseContent(fullContent) + '<span class="ai-cursor">|</span>';
                    currentAiResponseContent = fullContent;

                    // 自动滚动到底部
                    responseContent.scrollTop = responseContent.scrollHeight;
                }

                // 处理缓存中剩余的数据
                if (buffer.startsWith('data:')) {
                    fullContent += buffer.substring(5);
                }

                // 完成后移除光标
                responseContent.innerHTML = formatSseContent(fullContent);
                currentAiResponseContent = fullContent;

            } catch (error) {
                console.error('AI 请求失败:', error);
                responseContent.innerHTML = '<p style="color: #e74c3c;">AI 请求失败，请稍后重试</p>';
            } finally {
                // 恢复按钮状态
                btn.disabled = false;
                icon.textContent = '🤖';
                text.textContent = 'AI一下';
            }
        }

        /**
         * 格式化 SSE 返回的内容（统一处理 [BR] 换行标记）
         */
        function formatSseContent(text) {
            if (!text) return '';
            return text
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/\[BR\]/g, '<br>');
        }

        // 当前 AI 回复的原始内容（用于复制）
        let currentAiResponseContent = '';

        /**
         * 复制 AI 回复内容
         */
        async function copyAiResponse() {
            if (!currentAiResponseContent) {
                return;
            }

            try {
                await navigator.clipboard.writeText(currentAiResponseContent);
                const btn = document.getElementById('aiCopyBtn');
                btn.textContent = '✅ 已复制';
                btn.classList.add('copied');
                setTimeout(() => {
                    btn.textContent = '📋 复制';
                    btn.classList.remove('copied');
                }, 2000);
            } catch (err) {
                console.error('复制失败:', err);
            }
        }
    </script>
</body>
</html>
