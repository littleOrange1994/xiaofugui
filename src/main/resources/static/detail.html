<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>иҸңи°ұиҜҰжғ… - е°ҸзҰҸиҙөе„ҝ</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- Markdown и§Јжһҗеә“ -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <!-- еӨҙйғЁ -->
    <header class="header" onclick="window.location.href='index.html'" style="cursor: pointer;" title="зӮ№еҮ»иҝ”еӣһйҰ–йЎө">
        <div class="container">
            <h1>е°ҸзҰҸиҙөе„ҝ</h1>
            <p>жҺўзҙўдёӯеҚҺзҫҺйЈҹпјҢе“Ғе‘іе®¶еёёе‘ійҒ“</p>
        </div>
    </header>

    <!-- иҜҰжғ…еҶ…е®№ -->
    <div class="container detail-page">
        <!-- иҝ”еӣһжҢүй’® -->
        <a href="javascript:void(0)" onclick="goBackToList()" class="back-btn">
            <span>&larr;</span>
            <span>иҝ”еӣһеҲ—иЎЁ</span>
        </a>

        <!-- еҠ иҪҪзҠ¶жҖҒ -->
        <div id="loading" class="loading">
            еҠ иҪҪдёӯ
        </div>

        <!-- й”ҷиҜҜзҠ¶жҖҒ -->
        <div id="errorState" class="empty-state" style="display: none;">
            <div class="icon">рҹҳҘ</div>
            <p id="errorMessage">иҸңи°ұдёҚеӯҳеңЁ</p>
            <a href="javascript:void(0)" onclick="goBackToList()" class="back-btn" style="margin-top: 20px;">иҝ”еӣһеҲ—иЎЁ</a>
        </div>

        <!-- иҜҰжғ…еҚЎзүҮ -->
        <div id="detailCard" class="detail-card" style="display: none;">
            <!-- еӨҙйғЁдҝЎжҒҜ -->
            <div class="detail-header">
                <div class="detail-image">
                    <div id="recipeImage"></div>
                </div>
                <div class="detail-info">
                    <h1 id="recipeName">иҸңе“ҒеҗҚз§°</h1>
                    <div class="detail-meta" id="recipeMeta">
                        <!-- ж ҮзӯҫеҠЁжҖҒз”ҹжҲҗ -->
                    </div>
                    <div class="detail-stats" id="recipeStats">
                        <!-- з»ҹи®ЎдҝЎжҒҜеҠЁжҖҒз”ҹжҲҗ -->
                    </div>
                    <div id="healthBenefit" style="display: none;">
                        <strong>е…»з”ҹеҠҹж•Ҳпјҡ</strong>
                        <span id="healthBenefitText"></span>
                    </div>
                    <div class="recommend-action" style="margin-top: 15px;">
                        <button id="recommendBtn" class="recommend-toggle-btn" onclick="toggleRecommend()">
                            <span id="recommendBtnIcon">вӯҗ</span>
                            <span id="recommendBtnText">ж·»еҠ еҲ°е°ҸжӣҫжҺЁиҚҗ</span>
                        </button>
                    </div>
                    <div class="recommend-action" style="margin-top: 10px;">
                        <button id="weeklyPlanBtn" class="recommend-toggle-btn weekly-plan-toggle-btn" onclick="toggleWeeklyPlan()">
                            <span id="weeklyPlanBtnIcon">рҹ“…</span>
                            <span id="weeklyPlanBtnText">еҠ е…ҘзҺүиҠіеҝғж„ҝеҚ•</span>
                        </button>
                    </div>
                    <div class="recommend-action" style="margin-top: 10px;">
                        <button id="aiBtn" class="recommend-toggle-btn ai-btn" onclick="askAI()">
                            <span id="aiBtnIcon">рҹӨ–</span>
                            <span id="aiBtnText">AIдёҖдёӢ</span>
                        </button>
                    </div>
                </div>
            </div>

            <!-- AI еӣһеӨҚеҢәеҹҹ -->
            <div id="aiResponseSection" class="ai-response-section" style="display: none;">
                <div class="ai-response-header">
                    <span class="ai-response-title">рҹӨ– AI зғ№йҘӘеҠ©жүӢ</span>
                    <div class="ai-response-header-actions">
                        <button class="ai-response-copy-btn" id="aiCopyBtn" onclick="copyAiResponse()">рҹ“Ӣ еӨҚеҲ¶</button>
                    </div>
                </div>
                <div class="ai-response-decor">
                    <span>рҹҚі</span><span>рҹҘў</span><span>рҹ”Ә</span><span>рҹ§Ӯ</span><span>рҹҚІ</span>
                </div>
                <div class="ai-response-keyword" id="aiResponseKeyword"></div>
                <div id="aiResponseContent" class="ai-response-content">
                    <!-- AI еӣһеӨҚеҶ…е®№еҠЁжҖҒз”ҹжҲҗ -->
                </div>
            </div>

            <!-- й…Қж–ҷ -->
            <div class="detail-section">
                <h2>рҹ“Ұ й…Қж–ҷжё…еҚ•</h2>
                <div id="ingredientsList" class="ingredients-list">
                    <!-- й…Қж–ҷеҠЁжҖҒз”ҹжҲҗ -->
                </div>
            </div>

            <!-- жӯҘйӘӨ -->
            <div class="detail-section">
                <h2>рҹ‘ЁвҖҚрҹҚі еҲ¶дҪңжӯҘйӘӨ</h2>
                <div id="stepsList" class="steps-list">
                    <!-- жӯҘйӘӨеҠЁжҖҒз”ҹжҲҗ -->
                </div>
            </div>
        </div>
    </div>

    <script>
        // API еҹәзЎҖи·Ҝеҫ„
        const API_BASE = '/api/recipes';
        const WEEKLY_PLAN_API_BASE = '/api/weekly-plan';

        // еҪ“еүҚиҸңи°ұж•°жҚ®
        let currentRecipe = null;

        // AI жөҒејҸиҫ“еҮәиҮӘеҠЁж»ҡеҠЁжҺ§еҲ¶пјҡз”ЁжҲ·дёҖж—ҰжүӢеҠЁж»ҡеҠЁиҝҮйЎөйқўпјҢжң¬ж¬Ўиҫ“еҮәе°ұдёҚеҶҚиҮӘеҠЁж»ҡеҠЁ
        let aiStreamingActive = false;
        let aiAutoScrollDisabledByUser = false;
        let aiAutoScrolling = false;
        let aiAutoScrollGuardInited = false;
        let aiAutoScrollRafId = 0;
        let aiAutoScrollPending = 0;

        /**
         * иҝ”еӣһеҲ—иЎЁйЎөе№¶жҒўеӨҚд№ӢеүҚзҡ„зҠ¶жҖҒ
         * иҜ»еҸ–URLдёӯзҡ„pageгҖҒcategoryгҖҒsearchеҸӮж•°пјҢжһ„йҖ иҝ”еӣһURL
         */
        function goBackToList() {
            const urlParams = new URLSearchParams(window.location.search);
            const page = urlParams.get('page') || '1';
            const category = urlParams.get('category') || '';
            const search = urlParams.get('search') || '';

            // жһ„йҖ иҝ”еӣһURLпјҢдҪҝз”ЁhashжқҘдј йҖ’зҠ¶жҖҒ
            let backUrl = 'index.html';
            const backParams = new URLSearchParams();
            if (page !== '1') backParams.set('page', page);
            if (category) backParams.set('category', category);
            if (search) backParams.set('search', search);

            if (backParams.toString()) {
                backUrl += '#' + backParams.toString();
            }

            window.location.href = backUrl;
        }

        // йЎөйқўеҠ иҪҪж—¶иҺ·еҸ–иҜҰжғ…
        document.addEventListener('DOMContentLoaded', function() {
            initAiAutoScrollGuard();

            const urlParams = new URLSearchParams(window.location.search);
            const id = urlParams.get('id');
            const autoAI = urlParams.get('autoAI') === 'true';

            if (!id) {
                showError('зјәе°‘иҸңи°ұ ID');
                return;
            }

            loadRecipeDetail(id, autoAI);
        });

        // еҠ иҪҪиҸңи°ұиҜҰжғ…
        async function loadRecipeDetail(id, autoAI = false) {
            try {
                const response = await fetch(`${API_BASE}/${id}`);
                const result = await response.json();

                if (result.code === 0 && result.data) {
                    currentRecipe = result.data;
                    renderDetail(result.data);
                    loadWeeklyPlanStatus(result.data.id);

                    // еҰӮжһңеёҰжңү autoAI еҸӮж•°пјҢиҮӘеҠЁи§ҰеҸ‘ AI
                    if (autoAI) {
                        setTimeout(() => {
                            askAI();
                        }, 300);
                    }
                } else {
                    showError(result.message || 'иҸңи°ұдёҚеӯҳеңЁ');
                }
            } catch (error) {
                console.error('еҠ иҪҪиҸңи°ұиҜҰжғ…еӨұиҙҘ:', error);
                showError('зҪ‘з»ңй”ҷиҜҜпјҢиҜ·зЁҚеҗҺйҮҚиҜ•');
            }
        }

        // жёІжҹ“иҜҰжғ…
        function renderDetail(recipe) {
            // йҡҗи—ҸеҠ иҪҪзҠ¶жҖҒ
            document.getElementById('loading').style.display = 'none';
            document.getElementById('detailCard').style.display = 'block';

            // жӣҙж–°йЎөйқўж Үйўҳ
            document.title = `${recipe.name} - е°ҸеҜҢиҙөиҸңи°ұ`;

            // еӣҫзүҮ
            const imageContainer = document.getElementById('recipeImage');
            if (recipe.imageUrl) {
                imageContainer.innerHTML = `<img src="${recipe.imageUrl}" alt="${escapeHtml(recipe.name)}" onerror="this.outerHTML='<div class=\\'placeholder-img\\'>рҹҚІ</div>'">`;
            } else {
                imageContainer.innerHTML = '<div class="placeholder-img">рҹҚІ</div>';
            }

            // еҗҚз§°
            document.getElementById('recipeName').textContent = recipe.name;

            // ж Үзӯҫ
            const metaHtml = [];
            if (recipe.category) {
                metaHtml.push(`<span class="meta-tag cuisine">${escapeHtml(recipe.category)}</span>`);
            }
            if (recipe.seasonTags) {
                recipe.seasonTags.split(/[,пјҢ]/).forEach(tag => {
                    if (tag.trim()) {
                        metaHtml.push(`<span class="meta-tag">${escapeHtml(tag.trim())}</span>`);
                    }
                });
            }
            if (recipe.festivalTags) {
                recipe.festivalTags.split(/[,пјҢ]/).forEach(tag => {
                    if (tag.trim()) {
                        metaHtml.push(`<span class="meta-tag">${escapeHtml(tag.trim())}</span>`);
                    }
                });
            }
            document.getElementById('recipeMeta').innerHTML = metaHtml.join('');

            // з»ҹи®ЎдҝЎжҒҜ
            const statsHtml = [];
            if (recipe.cookingTime) {
                statsHtml.push(`
                    <div class="stat-item">
                        <div class="label">зғ№йҘӘж—¶й—ҙ</div>
                        <div class="value">${recipe.cookingTime}еҲҶй’ҹ</div>
                    </div>
                `);
            }
            if (recipe.difficulty) {
                statsHtml.push(`
                    <div class="stat-item">
                        <div class="label">йҡҫеәҰзӯүзә§</div>
                        <div class="value">${getDifficultyText(recipe.difficulty)}</div>
                    </div>
                `);
            }
            if (recipe.spicyLevel !== null && recipe.spicyLevel !== undefined) {
                statsHtml.push(`
                    <div class="stat-item">
                        <div class="label">иҫЈеәҰ</div>
                        <div class="value">${getSpicyLevel(recipe.spicyLevel)}</div>
                    </div>
                `);
            }
            if (recipe.recommendScore) {
                statsHtml.push(`
                    <div class="stat-item">
                        <div class="label">жҺЁиҚҗжҢҮж•°</div>
                        <div class="value">${getRecommendScore(recipe.recommendScore)}</div>
                    </div>
                `);
            }
            if (recipe.marketPrice) {
                statsHtml.push(`
                    <div class="stat-item">
                        <div class="label">еҸӮиҖғд»·ж ј</div>
                        <div class="value">ВҘ${recipe.marketPrice}</div>
                    </div>
                `);
            }
            document.getElementById('recipeStats').innerHTML = statsHtml.join('');

            // е…»з”ҹеҠҹж•Ҳ
            if (recipe.healthBenefit) {
                document.getElementById('healthBenefit').style.display = 'block';
                document.getElementById('healthBenefitText').textContent = recipe.healthBenefit;
            }

            // жӣҙж–°жҺЁиҚҗжҢүй’®зҠ¶жҖҒ
            updateRecommendButton(recipe.recommended);

            // й…Қж–ҷ
            renderIngredients(recipe.ingredients);

            // жӯҘйӘӨ
            renderSteps(recipe.steps);
        }

        // и§Јжһҗж•°жҚ®пјҲж”ҜжҢҒ JSON ж•°з»„е’Ңжҷ®йҖҡж–Үжң¬ж јејҸпјү
        function parseDataToArray(str, textDelimiter) {
            if (!str || str === '[]') {
                return [];
            }

            // е°қиҜ• JSON и§Јжһҗ
            try {
                const parsed = JSON.parse(str);
                if (Array.isArray(parsed)) {
                    return parsed.filter(item => item && String(item).trim());
                }
            } catch (e) {
                // йқһ JSON ж јејҸпјҢдҪҝз”Ёж–Үжң¬еҲҶеүІ
            }

            // ж–Үжң¬еҲҶеүІ
            return str.split(textDelimiter).filter(item => item && item.trim());
        }

        // жёІжҹ“й…Қж–ҷ
        function renderIngredients(ingredientsStr) {
            const container = document.getElementById('ingredientsList');

            const ingredients = parseDataToArray(ingredientsStr, /[,пјҢ;пјӣ\n]/);

            if (ingredients.length === 0) {
                container.innerHTML = '<p style="color: #999;">жҡӮж— й…Қж–ҷдҝЎжҒҜ</p>';
                return;
            }

            container.innerHTML = ingredients.map(item => `
                <div class="ingredient-item">${escapeHtml(String(item).trim())}</div>
            `).join('');
        }

        // жёІжҹ“жӯҘйӘӨ
        function renderSteps(stepsStr) {
            const container = document.getElementById('stepsList');

            // е…Ҳе°қиҜ• JSON и§Јжһҗ
            let steps = parseDataToArray(stepsStr, /\n/);

            // еҰӮжһңдёҚжҳҜ JSON дё”жңүж•°еӯ—еәҸеҸ·ж јејҸпјҢз”ЁеәҸеҸ·еҲҶеүІ
            if (steps.length === 1 && /\d+[.гҖҒпјҺ]\s*/.test(stepsStr)) {
                steps = stepsStr.split(/\d+[.гҖҒпјҺ]\s*/).filter(item => item && item.trim());
            }

            if (steps.length === 0) {
                container.innerHTML = '<p style="color: #999;">жҡӮж— жӯҘйӘӨдҝЎжҒҜ</p>';
                return;
            }

            container.innerHTML = steps.map(step => `
                <div class="step-item">
                    <div class="step-content">${escapeHtml(String(step).trim())}</div>
                </div>
            `).join('');
        }

        // жҳҫзӨәй”ҷиҜҜ
        function showError(message) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('errorState').style.display = 'block';
            document.getElementById('errorMessage').textContent = message;
        }

        // иҺ·еҸ–йҡҫеәҰж–Үеӯ—
        function getDifficultyText(level) {
            const texts = ['', 'з®ҖеҚ•', 'жҷ®йҖҡ', 'иҫғйҡҫ', 'еӣ°йҡҫ', 'еӨ§еёҲзә§'];
            return texts[level] || 'жңӘзҹҘ';
        }

        // иҺ·еҸ–иҫЈеәҰжҳҫзӨә
        function getSpicyLevel(level) {
            if (!level || level === 0) return 'дёҚиҫЈ';
            return 'рҹҢ¶пёҸ'.repeat(Math.min(level, 5));
        }

        // иҺ·еҸ–жҺЁиҚҗжҳҹзә§
        function getRecommendScore(score) {
            if (!score) return '-';
            const fullStars = Math.floor(score / 2);
            const halfStar = score % 2 >= 1;
            let stars = 'вӯҗ'.repeat(fullStars);
            if (halfStar) stars += 'вңЁ';
            return stars || '-';
        }

        // HTML иҪ¬д№ү
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // жӣҙж–°жҺЁиҚҗжҢүй’®зҠ¶жҖҒ
        function updateRecommendButton(isRecommended) {
            const btn = document.getElementById('recommendBtn');
            const icon = document.getElementById('recommendBtnIcon');
            const text = document.getElementById('recommendBtnText');

            if (isRecommended === 1) {
                btn.classList.add('recommended');
                icon.textContent = 'вң…';
                text.textContent = 'е·ІеҠ е…Ҙе°ҸжӣҫжҺЁиҚҗ';
            } else {
                btn.classList.remove('recommended');
                icon.textContent = 'вӯҗ';
                text.textContent = 'ж·»еҠ еҲ°е°ҸжӣҫжҺЁиҚҗ';
            }
        }

        // еҲҮжҚўжҺЁиҚҗзҠ¶жҖҒ
        async function toggleRecommend() {
            if (!currentRecipe) return;

            const newStatus = currentRecipe.recommended === 1 ? 0 : 1;
            const btn = document.getElementById('recommendBtn');
            btn.disabled = true;

            try {
                const response = await fetch(`${API_BASE}/update`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        id: currentRecipe.id,
                        recommended: newStatus
                    })
                });
                const result = await response.json();

                if (result.code === 0) {
                    currentRecipe.recommended = newStatus;
                    updateRecommendButton(newStatus);
                } else {
                    alert('ж“ҚдҪңеӨұиҙҘпјҡ' + (result.message || 'жңӘзҹҘй”ҷиҜҜ'));
                }
            } catch (error) {
                console.error('еҲҮжҚўжҺЁиҚҗзҠ¶жҖҒеӨұиҙҘ:', error);
                alert('зҪ‘з»ңй”ҷиҜҜпјҢиҜ·зЁҚеҗҺйҮҚиҜ•');
            } finally {
                btn.disabled = false;
            }
        }

        // жӣҙж–°жң¬е‘Ёи®ЎеҲ’жҢүй’®зҠ¶жҖҒ
        function updateWeeklyPlanButton(inWeeklyPlan) {
            const btn = document.getElementById('weeklyPlanBtn');
            const icon = document.getElementById('weeklyPlanBtnIcon');
            const text = document.getElementById('weeklyPlanBtnText');

            if (inWeeklyPlan) {
                btn.classList.add('recommended');
                icon.textContent = 'вң…';
                text.textContent = 'е·ІеҠ е…ҘзҺүиҠіеҝғж„ҝеҚ•';
            } else {
                btn.classList.remove('recommended');
                icon.textContent = 'рҹ“…';
                text.textContent = 'еҠ е…ҘзҺүиҠіеҝғж„ҝеҚ•';
            }
        }

        // еҠ иҪҪжң¬е‘Ёи®ЎеҲ’зҠ¶жҖҒ
        async function loadWeeklyPlanStatus(recipeId) {
            if (!recipeId) return;
            try {
                const response = await fetch(`${WEEKLY_PLAN_API_BASE}/exists?recipeId=${recipeId}`);
                const result = await response.json();
                if (result.code === 0) {
                    currentRecipe.inWeeklyPlan = !!result.data;
                    updateWeeklyPlanButton(currentRecipe.inWeeklyPlan);
                }
            } catch (error) {
                console.error('еҠ иҪҪжң¬е‘Ёи®ЎеҲ’зҠ¶жҖҒеӨұиҙҘ:', error);
            }
        }

        // еҲҮжҚўжң¬е‘Ёи®ЎеҲ’зҠ¶жҖҒ
        async function toggleWeeklyPlan() {
            if (!currentRecipe) return;

            const btn = document.getElementById('weeklyPlanBtn');
            btn.disabled = true;

            const api = currentRecipe.inWeeklyPlan ? `${WEEKLY_PLAN_API_BASE}/remove` : `${WEEKLY_PLAN_API_BASE}/add`;

            try {
                const response = await fetch(api, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ recipeId: currentRecipe.id })
                });
                const result = await response.json();

                if (result.code === 0) {
                    currentRecipe.inWeeklyPlan = !currentRecipe.inWeeklyPlan;
                    updateWeeklyPlanButton(currentRecipe.inWeeklyPlan);
                } else {
                    alert('ж“ҚдҪңеӨұиҙҘпјҡ' + (result.message || 'жңӘзҹҘй”ҷиҜҜ'));
                }
            } catch (error) {
                console.error('еҲҮжҚўжң¬е‘Ёи®ЎеҲ’зҠ¶жҖҒеӨұиҙҘ:', error);
                alert('зҪ‘з»ңй”ҷиҜҜпјҢиҜ·зЁҚеҗҺйҮҚиҜ•');
            } finally {
                btn.disabled = false;
            }
        }

        /**
         * AIдёҖдёӢ - и°ғз”ЁеӨ§жЁЎеһӢиҺ·еҸ–иҸңе“Ғзӣёе…ідҝЎжҒҜ
         * дҪҝз”ЁжөҒејҸжҺҘеҸЈе®һж—¶жҳҫзӨә AI еӣһеӨҚ
         */
        async function askAI() {
            if (!currentRecipe) return;

            const btn = document.getElementById('aiBtn');
            const icon = document.getElementById('aiBtnIcon');
            const text = document.getElementById('aiBtnText');
            const responseSection = document.getElementById('aiResponseSection');
            const responseContent = document.getElementById('aiResponseContent');
            const responseKeyword = document.getElementById('aiResponseKeyword');

            // зҰҒз”ЁжҢүй’®пјҢжҳҫзӨәеҠ иҪҪзҠ¶жҖҒ
            btn.disabled = true;
            icon.textContent = 'вҸі';
            text.textContent = 'жҖқиҖғдёӯ...';

            // жҳҫзӨәеӣһеӨҚеҢәеҹҹпјҢи®ҫзҪ®ж ҮйўҳпјҢжё…з©әеҶ…е®№
            responseSection.style.display = 'block';
            responseKeyword.textContent = `гҖҢ${currentRecipe.name}гҖҚзҡ„зғ№йҘӘиҜҙжҳҺ`;
            responseContent.innerHTML = '<div class="ai-loading-hint">AI жӯЈеңЁжҖқиҖғдёӯ...</div>';

            // жң¬ж¬Ў AI иҫ“еҮәејҖе§Ӣпјҡй»ҳи®Өе…Ғи®ёиҮӘеҠЁж»ҡеҠЁпјӣз”ЁжҲ·еҸӘиҰҒжүӢеҠЁж»ҡеҠЁдёҖж¬Ўе°ұдјҡе…ій—ӯ
            aiStreamingActive = true;
            aiAutoScrollDisabledByUser = false;
            aiAutoScrollPending = 0;
            if (aiAutoScrollRafId) {
                cancelAnimationFrame(aiAutoScrollRafId);
                aiAutoScrollRafId = 0;
            }

            const systemPrompt = 'дҪ жҳҜдёҖдёӘе№Ҫй»ҳйЈҺи¶Јзҡ„дё“дёҡеҺЁеёҲпјҢзІҫйҖҡеҗ„з§ҚиҸңе“Ғзҡ„еҒҡжі•гҖӮеӣһеӨҚиҰҒжұӮпјҡ1.дёҚиҰҒдҪҝз”ЁMarkdownж јејҸпјҲдёҚиҰҒз”Ё#гҖҒ**гҖҒ-гҖҒвҖўзӯүз¬ҰеҸ·пјүпјӣ2.жӯҘйӘӨз”Ё"з¬¬дёҖжӯҘ"гҖҒ"з¬¬дәҢжӯҘ"иЎЁиҝ°пјҢжҜҸдёҖжӯҘеҝ…йЎ»еҚ•зӢ¬дёҖиЎҢпјҢжӯҘйӘӨд№Ӣй—ҙиҰҒжҚўиЎҢпјӣ3.йЈҹжқҗжё…еҚ•жҜҸз§ҚйЈҹжқҗеҚ•зӢ¬дёҖиЎҢпјӣ4.иҜӯиЁҖйЈҺж јиҪ»жқҫе№Ҫй»ҳпјҢеҸҜд»ҘеҠ е…ҘдҝҸзҡ®иҜқпјӣ5.еҒҡжі•еҝ…йЎ»иҜҰз»Ҷе®Ңж•ҙпјҢйЈҹжқҗз”ЁйҮҸеҮҶзЎ®пјҢжӯҘйӘӨдёҚиғҪзңҒз•ҘпјҢзҒ«еҖҷж—¶й—ҙиҰҒе…·дҪ“гҖӮ';
            const userMessage = `иҜ·д»Ӣз»ҚдёҖдёӢ"${currentRecipe.name}"иҝҷйҒ“иҸң`;

            try {
                const response = await fetch('/api/chatStream', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: userMessage,
                        systemPrompt: systemPrompt
                    })
                });

                if (!response.ok) {
                    throw new Error('иҜ·жұӮеӨұиҙҘ');
                }

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let fullContent = '';
                let buffer = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });

                    // йҖҗиЎҢеӨ„зҗҶ
                    let newlineIndex;
                    while ((newlineIndex = buffer.indexOf('\n')) !== -1) {
                        const line = buffer.substring(0, newlineIndex);
                        buffer = buffer.substring(newlineIndex + 1);

                        if (line.startsWith('data:')) {
                            fullContent += line.substring(5);
                        }
                    }

                    // е®һж—¶жӣҙж–°йЎөйқў
                    responseContent.innerHTML = formatSseContent(fullContent) + '<span class="ai-cursor">|</span>';
                    currentAiResponseContent = fullContent;
                    autoScrollAiResponseDuringStreaming();
                }

                // еӨ„зҗҶзј“еӯҳдёӯеү©дҪҷзҡ„ж•°жҚ®
                if (buffer.startsWith('data:')) {
                    fullContent += buffer.substring(5);
                }

                // е®ҢжҲҗеҗҺз§»йҷӨе…үж Ү
                responseContent.innerHTML = formatSseContent(fullContent);
                currentAiResponseContent = fullContent;
                autoScrollAiResponseDuringStreaming();

            } catch (error) {
                console.error('AI иҜ·жұӮеӨұиҙҘ:', error);
                responseContent.innerHTML = '<p style="color: #e74c3c;">AI иҜ·жұӮеӨұиҙҘпјҢиҜ·зЁҚеҗҺйҮҚиҜ•</p>';
            } finally {
                aiStreamingActive = false;
                // жҒўеӨҚжҢүй’®зҠ¶жҖҒ
                btn.disabled = false;
                icon.textContent = 'рҹӨ–';
                text.textContent = 'AIдёҖдёӢ';
            }
        }

        /**
         * еҲқе§ӢеҢ–пјҡзӣ‘еҗ¬з”ЁжҲ·жүӢеҠЁж»ҡеҠЁпјҢдёҖж—ҰеҸ‘з”ҹеҲҷе…ій—ӯжң¬ж¬Ў AI иҫ“еҮәзҡ„иҮӘеҠЁж»ҡеҠЁ
         */
        function initAiAutoScrollGuard() {
            if (aiAutoScrollGuardInited) return;
            aiAutoScrollGuardInited = true;

            const disableAutoScroll = () => {
                if (!aiStreamingActive) return;
                aiAutoScrollDisabledByUser = true;
            };

            window.addEventListener('wheel', disableAutoScroll, { passive: true });
            window.addEventListener('touchmove', disableAutoScroll, { passive: true });
            window.addEventListener('scroll', () => {
                if (!aiStreamingActive) return;
                if (aiAutoScrolling) return;
                // жӢ–еҠЁж»ҡеҠЁжқЎзӯүеңәжҷҜдёҚдјҡи§ҰеҸ‘ wheelпјҢиҝҷйҮҢе…ңеә•
                aiAutoScrollDisabledByUser = true;
            }, { passive: true });

            window.addEventListener('keydown', (e) => {
                if (!aiStreamingActive) return;
                const keys = ['ArrowDown', 'ArrowUp', 'PageDown', 'PageUp', 'Home', 'End', ' '];
                if (keys.includes(e.key)) {
                    aiAutoScrollDisabledByUser = true;
                }
            });
        }

        /**
         * жөҒејҸиҫ“еҮәйҳ¶ж®өиҮӘеҠЁж»ҡеҠЁпјҲд»…еҪ“з”ЁжҲ·жңӘжүӢеҠЁж»ҡеҠЁж—¶з”ҹж•Ҳпјү
         */
        function autoScrollAiResponseDuringStreaming() {
            if (!aiStreamingActive) return;
            if (aiAutoScrollDisabledByUser) return;

            const responseSection = document.getElementById('aiResponseSection');
            if (!responseSection) return;

            const rect = responseSection.getBoundingClientRect();
            const viewportHeight = window.innerHeight || document.documentElement.clientHeight;
            const bottomGap = 16;
            const overflow = rect.bottom - (viewportHeight - bottomGap);
            if (overflow <= 0) return;

            // еҗҲе№¶йў‘з№Ғзҡ„ж»ҡеҠЁиҜ·жұӮпјҢйҒҝе…ҚжҠ–еҠЁ
            aiAutoScrollPending = Math.max(aiAutoScrollPending, overflow);
            if (aiAutoScrollRafId) return;

            aiAutoScrollRafId = requestAnimationFrame(() => {
                aiAutoScrollRafId = 0;

                if (!aiStreamingActive) return;
                if (aiAutoScrollDisabledByUser) return;

                const delta = aiAutoScrollPending;
                aiAutoScrollPending = 0;
                if (delta <= 0) return;

                aiAutoScrolling = true;
                window.scrollBy({ top: delta, left: 0, behavior: 'auto' });
                setTimeout(() => {
                    aiAutoScrolling = false;
                }, 120);
            });
        }

        /**
         * ж јејҸеҢ– SSE иҝ”еӣһзҡ„еҶ…е®№пјҲз»ҹдёҖеӨ„зҗҶ [BR] жҚўиЎҢж Үи®°пјү
         */
        function formatSseContent(text) {
            if (!text) return '';
            return text
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/\[BR\]/g, '<br>');
        }

        // еҪ“еүҚ AI еӣһеӨҚзҡ„еҺҹе§ӢеҶ…е®№пјҲз”ЁдәҺеӨҚеҲ¶пјү
        let currentAiResponseContent = '';

        /**
         * еӨҚеҲ¶ AI еӣһеӨҚеҶ…е®№
         */
        async function copyAiResponse() {
            if (!currentAiResponseContent) {
                return;
            }

            try {
                await navigator.clipboard.writeText(currentAiResponseContent);
                const btn = document.getElementById('aiCopyBtn');
                btn.textContent = 'вң… е·ІеӨҚеҲ¶';
                btn.classList.add('copied');
                setTimeout(() => {
                    btn.textContent = 'рҹ“Ӣ еӨҚеҲ¶';
                    btn.classList.remove('copied');
                }, 2000);
            } catch (err) {
                console.error('еӨҚеҲ¶еӨұиҙҘ:', err);
            }
        }
    </script>
