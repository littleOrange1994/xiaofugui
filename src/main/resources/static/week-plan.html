<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>玉芳心愿单 - 小福贵儿</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/week-plan.css">
</head>
<body>
    <!-- 飘浮装饰 -->
    <div class="floating-food-bg">
        <span class="food-item">🍳</span>
        <span class="food-item">🥘</span>
        <span class="food-item">🍲</span>
        <span class="food-item">🥄</span>
        <span class="food-item">🥢</span>
        <span class="food-item">🫕</span>
        <span class="food-item">🍶</span>
        <span class="food-item">🥣</span>
        <span class="food-item">🍵</span>
        <span class="food-item">🫖</span>
        <span class="food-item">🥡</span>
        <span class="food-item">🍽️</span>
        <span class="food-item">🔪</span>
        <span class="food-item">🧂</span>
        <span class="food-item">🫙</span>
    </div>

    <!-- 头部 -->
    <header class="header" onclick="window.location.href='index.html'" style="cursor: pointer;" title="点击返回首页">
        <div class="container">
            <h1>小福贵儿</h1>
            <p>玉芳心愿单 · 想吃的都先收起来</p>
        </div>
    </header>

    <!-- 主内容区 -->
    <div class="container">
        <!-- 顶部导航栏 -->
        <div class="week-plan-header">
            <button onclick="goBackHome()" class="back-home-btn">
                <span class="back-icon">&larr;</span>
                <span>返回首页</span>
            </button>
            <div class="header-title-area">
                <h2 class="page-main-title">
                    <span class="title-icon">📅</span>
                    <span>玉芳心愿单</span>
                </h2>
                <p class="page-subtitle">收藏美味，规划每一餐的幸福</p>
            </div>
            <button class="clear-all-btn" onclick="clearWeeklyPlan()">
                <span>🗑️</span>
                <span>清空全部</span>
            </button>
        </div>

        <!-- 统计卡片 -->
        <div class="stats-bar">
            <div class="stat-item">
                <span class="stat-icon">🍽️</span>
                <span class="stat-label">已收藏</span>
                <span class="stat-value" id="totalCount">0</span>
                <span class="stat-unit">道</span>
            </div>
            <div class="stat-item">
                <span class="stat-icon">✅</span>
                <span class="stat-label">已安排</span>
                <span class="stat-value" id="assignedCount">0</span>
                <span class="stat-unit">道</span>
            </div>
            <div class="stat-item">
                <span class="stat-icon">⏳</span>
                <span class="stat-label">待安排</span>
                <span class="stat-value" id="unassignedCount">0</span>
                <span class="stat-unit">道</span>
            </div>
        </div>

        <!-- 心愿单内容 -->
        <div id="weeklyPlanContainer" class="weekly-plan-content">
            <!-- 动态填充 -->
        </div>

        <!-- 加载状态 -->
        <div id="loading" class="loading" style="display: none;">
            <div class="loading-spinner"></div>
            <span>加载中...</span>
        </div>

        <!-- 空状态 -->
        <div id="emptyState" class="empty-wishlist" style="display: none;">
            <div class="empty-illustration">
                <div class="empty-plate">🍽️</div>
                <div class="empty-sparkles">
                    <span>✨</span><span>✨</span><span>✨</span>
                </div>
            </div>
            <h3>心愿单还是空的呢~</h3>
            <p>去探索美味，把想吃的菜都加进来吧！</p>
            <a href="index.html" class="explore-btn">
                <span>🔍</span>
                <span>去探索美食</span>
            </a>
        </div>
    </div>

    <!-- 页脚 -->
    <footer class="footer">
        <div class="footer-decor">
            <span>🥢</span>
            <span>🍜</span>
            <span>🥟</span>
            <span>🍲</span>
            <span>🥡</span>
        </div>
        <p>小福贵儿 · 用心烹饪每一道菜</p>
        <p class="footer-sub">探索中华美食的无限魅力</p>
    </footer>

    <script src="js/week-plan.js"></script>
</body>
</html>
