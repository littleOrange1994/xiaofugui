<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小富贵菜谱 - 发现美味</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- 头部 -->
    <header class="header">
        <div class="container">
            <h1>小富贵菜谱</h1>
            <p>探索中华美食，品味家常味道</p>
        </div>
    </header>

    <!-- 搜索区域 -->
    <div class="container">
        <div class="search-section">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="搜索菜谱，如：红烧肉、宫保鸡丁...">
                <button onclick="searchRecipes()">搜索</button>
            </div>
        </div>
    </div>

    <!-- 菜系筛选 -->
    <div class="container">
        <div class="filter-section">
            <div class="filter-tags">
                <span class="filter-tag active" data-cuisine="">全部</span>
                <span class="filter-tag" data-cuisine="川菜">川菜</span>
                <span class="filter-tag" data-cuisine="鲁菜">鲁菜</span>
                <span class="filter-tag" data-cuisine="粤菜">粤菜</span>
                <span class="filter-tag" data-cuisine="淮扬菜">淮扬菜</span>
                <span class="filter-tag" data-cuisine="湘菜">湘菜</span>
                <span class="filter-tag" data-cuisine="浙菜">浙菜</span>
                <span class="filter-tag" data-cuisine="闽菜">闽菜</span>
                <span class="filter-tag" data-cuisine="徽菜">徽菜</span>
                <span class="filter-tag" data-cuisine="其他">其他</span>
            </div>
        </div>
    </div>

    <!-- 菜谱列表 -->
    <div class="container">
        <div id="recipeGrid" class="recipe-grid">
            <!-- 菜谱卡片将通过 JS 动态生成 -->
        </div>

        <!-- 加载状态 -->
        <div id="loading" class="loading" style="display: none;">
            加载中
        </div>

        <!-- 空状态 -->
        <div id="emptyState" class="empty-state" style="display: none;">
            <div class="icon">🍳</div>
            <p>暂无菜谱数据</p>
        </div>
    </div>

    <!-- 分页 -->
    <div class="container">
        <div id="pagination" class="pagination" style="display: none;">
            <button id="prevBtn" onclick="changePage(-1)">上一页</button>
            <span id="pageInfo" class="page-info">第 1 页</span>
            <button id="nextBtn" onclick="changePage(1)">下一页</button>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
